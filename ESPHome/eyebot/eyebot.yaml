substitutions:
  name: btproxy5
  devices: !secret devices
  ap_ssid: !secret ap_ssid
  ap_pw: !secret ap_pw
  ota_pw: !secret ota_pw

esphome:
  name: ${name}
  friendly_name: ${ name | title }
  name_add_mac_suffix: false

esp32:
  board: seeed_xiao_esp32s3
  framework:
    type: esp-idf

# Enable logging
logger:
  level: DEBUG

debug:
  update_interval: 5s

# Enable Home Assistant API
api:
  encryption: 
    key: ${ devices[name].api.key }
    
# Allow Over-The-Air updates
ota:
- platform: esphome
  password: ${ota_pw}${name}

wifi:
  ssid: !secret iot_ssid
  password: !secret iot_password
  post_connect_roaming: false
  manual_ip:
    static_ip: ${ devices[name].wifi.ip }
    gateway: ${ devices[name].wifi.gateway }
    subnet: ${ devices[name].wifi.subnet }
  ap:
    password: ${ap_pw}_${name}

esp32_ble_tracker:
  id: ${name}_tracker
  scan_parameters:
    interval: 320ms
    window: 30ms
    active: true

bluetooth_proxy:
  active: true
  id: ble_proxy

captive_portal:
  

button:
  - platform: shutdown
    name: ${name} Shutdown

  - platform: restart
    name: ${name} Restart

text_sensor:
  - platform: wifi_info
    mac_address: 
      name: ${name} MAC Address

  - platform: debug
    device:
      name: ${name} Device Info
    reset_reason:
      name: ${name} Reset Reason
font:
  - file:
      type: gfonts
      family: Roboto
      weight: 900
    id: roboto_16
    size: 16

i2c:
  sda: GPIO05
  scl: GPIO06
  frequency: 400kHz

globals:
  - id: eye_x
    type: float
    initial_value: '0.0'

  - id: eye_y
    type: float
    initial_value: '0.0'

  - id: eye_amplitude
    type: float
    initial_value: '0.0'

  - id: next_blink_time
    type: uint32_t
    initial_value: '0'

number:
  - platform: template
    name: "Blink Max Interval"
    id: blink_max_delay
    min_value: 1.1
    max_value: 15.0
    step: 0.1
    initial_value: 5.0
    unit_of_measurement: "s"
    optimistic: true
    restore_value: true

  - platform: template
    name: "Look Around Speed"
    id: look_speed
    min_value: 1
    max_value: 10
    step: 1
    initial_value: 3
    optimistic: true
    restore_value: true

select:
  - platform: template
    name: "Robot Emotion"
    id: robot_emotion
    options:
      - "Neutral"
      - "Happy"
      - "Angry"
      - "Sad"
      - "Worried"
      - "Scared"
      - "Bored"
      - "Skeptic"
      - "Squint"
      - "Suspicious"
    initial_option: "Neutral"
    optimistic: True

  - platform: template
    name: "Robot Position"
    id: robot_position
    options: 
      - "Front"
      - "Left"
      - "Right"
      - "Up"
      - "Down"
    initial_option: "Front"
    optimistic: True

switch:
  - platform: template
    name: "Looking Around"
    id: looking_around_toggle
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF

  - platform: template
    name: "Auto Blink"
    id: auto_blink_toggle
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    
display:
  - platform: ssd1306_i2c
    model: "SSD1306 128x64"
    address: 0x3C
    update_interval: 32ms
    lambda: |-
      auto emotion = id(robot_emotion).current_option();
      auto pos = id(robot_position).current_option();
      bool is_looking = id(looking_around_toggle).state;
      bool is_blinking_enabled = id(auto_blink_toggle).state;
      uint32_t now = millis();

      // --- ANIMATION ENGINE ---
      float target_x = 0, target_y = 0;
      float speed_multiplier = id(look_speed).state * 0.0007f;

      if (is_looking) {
        id(eye_amplitude) += 0.05f;
        if (id(eye_amplitude) > 1.0f) id(eye_amplitude) = 1.0f;
        target_x = (18.0f * sin(now * speed_multiplier)) * id(eye_amplitude);
      } else {
        id(eye_amplitude) -= 0.05f;
        if (id(eye_amplitude) < 0.0f) id(eye_amplitude) = 0.0f;
        if (pos == "Left") target_x = -20;
        else if (pos == "Right") target_x = 20;
        else target_x = (18.0f * sin(now * speed_multiplier)) * id(eye_amplitude);
      }

      if (pos == "Up") target_y = -12;
      else if (pos == "Down") target_y = 12;

      id(eye_x) += (target_x - id(eye_x)) * 0.15f;
      id(eye_y) += (target_y - id(eye_y)) * 0.15f;
      int offset_x = (int)id(eye_x);
      int offset_y = (int)id(eye_y);

      // --- BLINK ENGINE ---
      bool currently_blinking = false;
      auto schedule_blink = [&]() {
        if (now > id(next_blink_time) + 150) {
           uint32_t max_ms = (uint32_t)(id(blink_max_delay).state * 1000);
           id(next_blink_time) = now + (rand() % (max_ms - 1000)) + 1000;
        }
      };
      if (is_blinking_enabled) {
        if (now > id(next_blink_time) && now < id(next_blink_time) + 150) currently_blinking = true;
        else schedule_blink();
      }

      // --- HELPERS ---
      int centerX = 64, centerY = 32;
      Color ON = COLOR_ON, OFF = COLOR_OFF;

      auto draw_eye = [&](int x, int y, int w, int h, int r) {
        it.filled_rectangle(x + r, y, w - r*2, h, ON);
        it.filled_rectangle(x, y + r, w, h - r*2, ON);
        it.filled_circle(x + r, y + r, r, ON); 
        it.filled_circle(x + w - r - 1, y + r, r, ON); 
        it.filled_circle(x + r, y + h - r - 1, r, ON); 
        it.filled_circle(x + w - r - 1, y + h - r - 1, r, ON); 
      };

      auto draw_flat_top_eye = [&](int x, int y, int w, int h, int r) {
        it.filled_rectangle(x, y, w, h - r, ON); 
        it.filled_rectangle(x + r, y + h - r, w - r*2, r, ON); 
        it.filled_circle(x + r, y + h - r - 1, r, ON); 
        it.filled_circle(x + w - r - 1, y + h - r - 1, r, ON); 
      };

      auto top_mask = [&](int x, int y_start, int y_end, int w) {
        for (int i = 0; i < w; i++) {
          int h = y_start + (i * (y_end - y_start) / w);
          it.filled_rectangle(x + i, 0, 1, h, OFF);
        }
      };

      auto draw_blink = [&](int w, int y_center, int gap) {
        it.filled_rectangle(centerX + offset_x - gap/2 - w, y_center, w, 2, ON);
        it.filled_rectangle(centerX + offset_x + gap/2, y_center, w, 2, ON);
      };

      // --- EMOTIONS ---
      if (emotion == "Neutral") {
        int w=38, h=38, gap=8, y = centerY + offset_y - 19;
        if (currently_blinking) draw_blink(w, centerY + offset_y, gap);
        else {
          draw_eye(centerX + offset_x - gap/2 - w, y + 5, w, h - 5, 12);
          draw_eye(centerX + offset_x + gap/2, y, w, h, 12);
        }
      }
      else if (emotion == "Skeptic") {
        int w=38, gap=8, leftH=34, rightH=30;
        int y_center = centerY + offset_y;
        int bottom_level = y_center + (leftH / 2); // Floor for both eyes

        if (currently_blinking) draw_blink(w, y_center, gap);
        else {
          // Left Eye: Normal tall centered eye
          draw_eye(centerX + offset_x - gap/2 - w, y_center - (leftH / 2), w, leftH, 12);
          
          // Right Eye: Bottom aligned to bottom_level, r=9 for perfect smooth curve
          int rx = centerX + offset_x + gap/2;
          int ry = bottom_level - rightH;
          draw_flat_top_eye(rx, ry, w, rightH, 12);
          
          // Mask: Inside (left) is half height, Outside (right) is full height
          // Only mask inner half (w/2) to ensure the outer corner radius is untouched
          top_mask(rx, ry + (rightH - 24), ry, w);
        }
      }
      else if (emotion == "Squint") {
        int w=40, r=0, gap=8, h = 5, y = centerY + offset_y - 2;
        if (currently_blinking) draw_blink(w, centerY + offset_y, gap);
        else {
          draw_eye(centerX + offset_x - gap/2 - w, y, w, h, r);
          draw_eye(centerX + offset_x + gap/2, y, w, h, r);
        }
      }
      else if (emotion == "Suspicious") {
        int w=42, h=18, r=8, gap=8, y = centerY + offset_y - 9;
        if (currently_blinking) draw_blink(w, centerY + offset_y, gap);
        else {
          draw_flat_top_eye(centerX + offset_x - gap/2 - w, y, w, h, r);
          draw_flat_top_eye(centerX + offset_x + gap/2, y, w, h, r);
          it.filled_rectangle(0, 0, 128, y + 4, OFF); 
        }
      }
      else if (emotion == "Scared") {
        int w=36, h=50, gap=4, y = centerY + offset_y - 25;
        if (currently_blinking) draw_blink(w, centerY + offset_y, gap);
        else {
          draw_eye(centerX + offset_x - gap/2 - w, y, w, h, 12);
          draw_eye(centerX + offset_x + gap/2, y, w, h, 12);
          top_mask(centerX + offset_x - gap/2 - w, y+15, y+5, w); 
          top_mask(centerX + offset_x + gap/2, y+5, y+15, w);     
          it.filled_rectangle(0, y + 40, 128, 25, OFF); 
        }
      }
      else if (emotion == "Bored") {
        int w=42, h=12, r=8, gap=8, y = centerY + offset_y - 7;
        if (currently_blinking) draw_blink(w, centerY + offset_y, gap);
        else {
          draw_flat_top_eye(centerX + offset_x - gap/2 - w, y, w, h, r);
          draw_flat_top_eye(centerX + offset_x + gap/2, y, w, h, r);
          it.filled_rectangle(0, 0, 128, y + 2, OFF);
        }
      }
      else if (emotion == "Angry") {
        int w=36, h=28, gap=8, y = centerY + offset_y - 14;
        if (currently_blinking) draw_blink(w, centerY + offset_y, gap);
        else {
          draw_eye(centerX + offset_x - gap/2 - w, y, w, h, 8);
          draw_eye(centerX + offset_x + gap/2, y, w, h, 8);
          top_mask(centerX + offset_x - gap/2 - w, y-5, y+14, w);
          top_mask(centerX + offset_x + gap/2, y+14, y-5, w);
        }
      }
      else if (emotion == "Sad") {
        int w=36, h=28, gap=12, y = centerY + offset_y - 14;
        if (currently_blinking) draw_blink(w, centerY + offset_y, gap);
        else {
          draw_eye(centerX + offset_x - gap/2 - w, y, w, h, 8);
          draw_eye(centerX + offset_x + gap/2, y, w, h, 8);
          top_mask(centerX + offset_x - gap/2 - w, y+14, y-5, w);
          top_mask(centerX + offset_x + gap/2, y-5, y+14, w);
        }
      }
      else if (emotion == "Worried") {
        int w=34, h=30, gap=12, y = centerY + offset_y - 15;
        if (currently_blinking) draw_blink(w, centerY + offset_y, gap);
        else {
          draw_eye(centerX + offset_x - gap/2 - w, y, w, h, 12);
          draw_eye(centerX + offset_x + gap/2, y, w, h, 12);
          top_mask(centerX + offset_x - gap/2 - w, y+10, y-2, w);
          top_mask(centerX + offset_x + gap/2, y-2, y+10, w);
        }
      }
      else if (emotion == "Happy") {
        int w=38, h=30, gap=8, y = centerY + offset_y - 15;
        if (currently_blinking) draw_blink(w, centerY + offset_y, gap);
        else {
          draw_eye(centerX + offset_x - gap/2 - w, y, w, h, 15);
          draw_eye(centerX + offset_x + gap/2, y, w, h, 15);
          it.filled_rectangle(0, centerY + offset_y, 128, 32, OFF);
        }
      }
